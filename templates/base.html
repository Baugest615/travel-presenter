<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>{{ trip.title }} | {{ trip.company or '' }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; }

  .slide {
    width: 1440px;
    min-height: 810px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    page-break-after: always;
  }
  .slide-inner {
    width: 100%;
    height: 810px;
    position: relative;
    display: flex;
  }

  {{ theme_css }}
</style>
</head>
<body>
{{ content }}
</body>
</html>
